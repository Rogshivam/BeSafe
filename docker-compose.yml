services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: besafe-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    environment:
      - NODE_ENV=production

    networks:
      - besafenet

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://besafe.shivamdev.info/api
        VITE_SOCKET_URL: https://besafe.shivamdev.info

    container_name: besafe-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    networks:
      - besafenet

networks:
  besafenet:
    driver: bridge
